<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ฟอร์มจองรถ (พนักงาน)</title>

  <!-- Preconnect สำหรับ performance -->
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #4f46e5;
      --primary-light: #6366f1;
      --primary-glow: rgba(99,102,241,0.18);
      --surface: #fff;
      --bg: #eef2ff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --success: #22c55e;
      --success-dark: #16a34a;
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      font-family: 'Kanit', sans-serif;
      background: linear-gradient(135deg, #eef2ff 0%, #f1f5ff 50%, #f8fafc 100%);
      color: var(--text);
    }

    /* ===== Layout ===== */
    .page-wrapper {
      display: flex;
      min-height: 100vh;
      gap: 0;
    }

    /* ===== LEFT: Form Panel ===== */
    .form-panel {
      width: 460px;
      min-width: 380px;
      flex-shrink: 0;
      background: var(--surface);
      box-shadow: 4px 0 24px rgba(79,70,229,0.08);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      position: relative;
      z-index: 1;
    }

    .form-header {
      background: linear-gradient(135deg, #3730a3, #4f46e5, #6366f1);
      padding: 28px 28px 22px;
      color: #fff;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .form-header h4 {
      margin: 0 0 4px;
      font-weight: 600;
      font-size: 20px;
      letter-spacing: 0.3px;
    }
    .form-header small {
      opacity: .75;
      font-size: 13px;
      font-weight: 300;
    }

    .form-body {
      padding: 24px 24px 32px;
      flex: 1;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: var(--primary);
      margin-bottom: 12px;
      padding-bottom: 6px;
      border-bottom: 2px solid var(--bg);
    }

    label {
      font-weight: 500;
      font-size: 13px;
      margin-bottom: 5px;
      color: var(--text);
      display: block;
    }

    .form-control, .form-select {
      border-radius: 10px;
      padding: 9px 13px;
      border: 1.5px solid var(--border);
      font-family: 'Kanit', sans-serif;
      font-size: 14px;
      transition: border-color .2s, box-shadow .2s;
      background: #fafbff;
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--primary-light);
      box-shadow: 0 0 0 3px var(--primary-glow);
      background: #fff;
      outline: none;
    }

    .btn-submit {
      background: linear-gradient(135deg, var(--success), var(--success-dark));
      border: none;
      border-radius: 12px;
      padding: 13px;
      font-weight: 600;
      font-size: 15px;
      font-family: 'Kanit', sans-serif;
      color: #fff;
      width: 100%;
      cursor: pointer;
      transition: transform .2s, box-shadow .2s, opacity .2s;
      letter-spacing: 0.3px;
    }
    .btn-submit:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(34,197,94,.35);
    }
    .btn-submit:disabled { opacity: .65; cursor: not-allowed; }

    /* Skeleton loader สำหรับ dropdown */
    .skeleton {
      background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 10px;
      height: 42px;
      border: none;
    }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    /* conflict alert */
    #conflictAlert {
      border-radius: 12px;
      display: none;
      font-size: 13px;
      white-space: pre-line;
      border: none;
      background: #fff7ed;
      border-left: 4px solid #f97316;
      color: #9a3412;
      padding: 12px 16px;
    }

    .link-admin {
      font-size: 13px;
      text-decoration: none;
      color: var(--muted);
      transition: color .2s;
      display: block;
      text-align: center;
      padding: 12px 0 4px;
    }
    .link-admin:hover { color: var(--primary); }

    /* ===== RIGHT: Calendar Panel ===== */
    .calendar-panel {
      flex: 1;
      padding: 28px 28px 28px 24px;
      display: flex;
      flex-direction: column;
      min-width: 0;
      overflow: hidden;
    }

    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .cal-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }
    .cal-legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .cal-legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--muted);
    }
    .cal-legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
    }

    #calendar {
      flex: 1;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: 0 2px 16px rgba(79,70,229,0.07);
      min-height: 500px;
    }

    /* FullCalendar overrides */
    .fc .fc-toolbar-title { font-family: 'Kanit', sans-serif; font-size: 17px !important; font-weight: 600; }
    .fc .fc-button {
      font-family: 'Kanit', sans-serif !important;
      border-radius: 8px !important;
      font-size: 13px !important;
    }
    .fc .fc-button-primary {
      background: var(--primary) !important;
      border-color: var(--primary) !important;
    }
    .fc .fc-button-primary:not(.fc-button-active):hover {
      background: var(--primary-light) !important;
    }
    .fc .fc-button-primary.fc-button-active {
      background: #3730a3 !important;
      border-color: #3730a3 !important;
    }
    .fc .fc-today-button { background: var(--primary-light) !important; border-color: var(--primary-light) !important; }
    .fc th { font-family: 'Kanit', sans-serif; font-size: 13px; font-weight: 500; }
    .fc .fc-daygrid-day-number { font-family: 'Kanit', sans-serif; font-size: 13px; }
    .fc .fc-event { border-radius: 6px !important; font-size: 12px; padding: 1px 5px; }
    .fc .fc-event-title { font-family: 'Kanit', sans-serif; font-weight: 500; }
    .fc .fc-daygrid-day.fc-day-today { background: rgba(99,102,241,.07) !important; }

    /* Calendar loading skeleton */
    .cal-skeleton {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--muted);
      gap: 10px;
    }
    .cal-spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== Custom Modal ===== */
    #toastOverlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(15,23,42,.5);
      z-index: 9999;
      align-items: center;
      justify-content: center;
    }
    #toastBox {
      background: #fff;
      border-radius: 20px;
      padding: 36px 32px;
      max-width: 360px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      font-family: 'Kanit', sans-serif;
    }
    #toastIcon { font-size: 52px; margin-bottom: 12px; }
    #toastMsg { font-size: 17px; font-weight: 500; white-space: pre-line; color: var(--text); }
    #toastBtn {
      margin-top: 24px;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: #fff; border: none; border-radius: 12px;
      padding: 10px 36px;
      font-family: 'Kanit', sans-serif; font-size: 15px; cursor: pointer;
    }

    /* Event Modal */
    #eventOverlay {
      position: fixed; inset: 0;
      background: rgba(15,23,42,.5);
      display: none; align-items: center; justify-content: center;
      z-index: 9998;
    }
    #eventBox {
      background: #fff; border-radius: 20px;
      padding: 28px 24px; max-width: 360px; width: 92%;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      font-family: 'Kanit', sans-serif;
    }
    #eventBox .ev-title {
      font-size: 16px; font-weight: 600; color: var(--text);
      margin-bottom: 14px; padding-bottom: 12px;
      border-bottom: 1.5px solid var(--border);
    }
    #eventBox .ev-row {
      display: flex; gap: 8px; margin-bottom: 9px;
      font-size: 13px; color: var(--muted);
    }
    #eventBox .ev-label { min-width: 72px; font-weight: 600; color: var(--text); }
    #eventBox .ev-badge {
      display: inline-block; padding: 3px 10px;
      border-radius: 8px; font-size: 12px; font-weight: 500; color: #fff;
    }
    #eventCloseBtn {
      margin-top: 18px; width: 100%;
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: #fff; border: none; border-radius: 12px;
      padding: 10px; font-family: 'Kanit', sans-serif;
      font-size: 14px; cursor: pointer;
    }

    /* ===== Responsive ===== */
    @media (max-width: 900px) {
      .page-wrapper { flex-direction: column; }
      .form-panel { width: 100%; min-width: 0; box-shadow: none; }
      .calendar-panel { padding: 20px 16px 28px; }
    }
  </style>
</head>

<body>
<div class="page-wrapper">

  <!-- ===== LEFT: Form Panel ===== -->
  <div class="form-panel">

    <div class="form-header">
      <h4>🚗 ระบบจองรถโรงพยาบาล</h4>
      <small>Hospital Vehicle Booking System</small>
    </div>

    <div class="form-body">

      <!-- Conflict Alert -->
      <div id="conflictAlert" class="mb-3" role="alert"></div>

      <form id="bookingForm" onsubmit="submitForm(event)">

        <!-- ข้อมูลผู้จอง -->
        <div class="mb-4">
          <div class="section-label">ข้อมูลผู้จอง</div>
          <div class="row g-2">
            <div class="col-12">
              <label>ชื่อ-สกุล</label>
              <input type="text" class="form-control" name="name" placeholder="กรุณากรอกชื่อ-สกุล" required>
            </div>
            <div class="col-12">
              <label>แผนก</label>
              <input type="text" class="form-control" name="department" placeholder="ระบุแผนก" required>
            </div>
          </div>
        </div>

        <!-- วันและเวลา -->
        <div class="mb-4">
          <div class="section-label">วันและเวลา</div>
          <div class="row g-2">
            <div class="col-8">
              <label>วันที่เดินทาง</label>
              <input type="date" class="form-control" name="dateOut" required>
            </div>
            <div class="col-4">
              <label>เวลาออก</label>
              <input type="time" class="form-control" name="timeOut" required>
            </div>
            <div class="col-8">
              <label>วันที่กลับ</label>
              <input type="date" class="form-control" name="dateIn" required>
            </div>
            <div class="col-4">
              <label>เวลากลับ</label>
              <input type="time" class="form-control" name="timeIn" required>
            </div>
          </div>
        </div>

        <!-- รายละเอียด -->
        <div class="mb-4">
          <div class="section-label">รายละเอียด</div>
          <div class="row g-2">
            <div class="col-12">
              <label>จุดหมาย / วัตถุประสงค์</label>
              <input type="text" class="form-control" name="destination" placeholder="เช่น ไปรับผู้ป่วยที่ รพ. X" required>
            </div>
            <div class="col-12">
              <label>เบอร์ติดต่อ</label>
              <input type="tel" class="form-control" name="phone" placeholder="0X-XXXX-XXXX" required>
            </div>
          </div>
        </div>

        <!-- เลือกรถและคนขับ -->
        <div class="mb-4">
          <div class="section-label">เลือกทรัพยากร</div>
          <div class="row g-2">
            <div class="col-12">
              <label>เลือกรถ</label>
              <!-- Skeleton จะถูกแทนที่เมื่อโหลดเสร็จ -->
              <div id="vehicleSkeleton" class="skeleton"></div>
              <select class="form-select" name="vehicle" id="vehicleSelect" style="display:none">
                <option value="">-- เลือกรถ --</option>
              </select>
            </div>
            <div class="col-12">
              <label>เลือกคนขับ</label>
              <div id="driverSkeleton" class="skeleton"></div>
              <select class="form-select" name="driver" id="driverSelect" style="display:none">
                <option value="">-- ไม่ระบุ / ให้แอดมินจัดหา --</option>
              </select>
            </div>
          </div>
        </div>

        <button type="submit" class="btn-submit" id="btnSubmit" disabled>
          ✅ ยืนยันคำขอจองรถ
        </button>

      </form>

      <a href="#" id="adminLink" class="link-admin mt-3">⚙️ สำหรับเจ้าหน้าที่แผนกรถ</a>
    </div>
  </div>

  <!-- ===== RIGHT: Calendar Panel ===== -->
  <div class="calendar-panel">
    <div class="cal-header">
      <div class="cal-title">📅 ปฏิทินการใช้รถ</div>
      <div class="cal-legend">
        <div class="cal-legend-item">
          <div class="cal-legend-dot" style="background:#6c757d"></div>
          <span>รอดำเนินการ</span>
        </div>
        <div class="cal-legend-item">
          <div class="cal-legend-dot" style="background:#198754"></div>
          <span>ดำเนินการเรียบร้อย</span>
        </div>
        <div class="cal-legend-item">
          <div class="cal-legend-dot" style="background:#dc3545"></div>
          <span>ยกเลิก</span>
        </div>
      </div>
    </div>

    <div id="calendar">
      <div class="cal-skeleton">
        <div class="cal-spinner"></div>
        <span>กำลังโหลดปฏิทิน...</span>
      </div>
    </div>
  </div>

</div>

<!-- ===== Toast Modal ===== -->
<div id="toastOverlay" style="display:none; position:fixed; inset:0; background:rgba(15,23,42,.5); z-index:9999; align-items:center; justify-content:center;">
  <div id="toastBox">
    <div id="toastIcon"></div>
    <div id="toastMsg"></div>
    <button id="toastBtn" onclick="closeToast()">ตกลง</button>
  </div>
</div>

<!-- ===== Event Detail Modal ===== -->
<div id="eventOverlay" onclick="if(event.target===this)closeEventModal()">
  <div id="eventBox">
    <div class="ev-title" id="evTitle"></div>
    <div class="ev-row"><span class="ev-label">📅 ช่วงเวลา</span><span id="evTime"></span></div>
    <div class="ev-row"><span class="ev-label">👤 ผู้จอง</span><span id="evBooker"></span></div>
    <div class="ev-row"><span class="ev-label">🏢 แผนก</span><span id="evDept"></span></div>
    <div class="ev-row"><span class="ev-label">🧑‍✈️ คนขับ</span><span id="evDriver"></span></div>
    <div class="ev-row"><span class="ev-label">📌 สถานะ</span><span id="evStatus"></span></div>
    <button id="eventCloseBtn" onclick="closeEventModal()">ปิด</button>
  </div>
</div>

<!-- Scripts โหลดท้าย -->
<script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>

<script>
/* ======================================================
   CONFIG — ใส่ Apps Script Deployment URL ของคุณที่นี่
   ====================================================== */
const API_URL = 'https://script.google.com/macros/s/AKfycbzGZtBDetdwe3BZq5ArXbvQ-VH1-KQNeQWGIIRyQhmJjNK6Ah1PHd37ZpCFQxoyWOGW/exec';

/* ----- helper: GET ----- */
async function api(action) {
  const res = await fetch(`${API_URL}?action=${action}`);
  return res.json();
}

/* ----- helper: POST ----- */
async function apiPost(body) {
  const res = await fetch(API_URL, {
    method: 'POST',
    body: JSON.stringify(body)
  });
  return res.json();
}

let _toastCallback = null;
let calendarInstance = null;

/* ----- Toast Modal ----- */
function showToast(icon, msg, cb) {
  document.getElementById('toastIcon').textContent = icon;
  document.getElementById('toastMsg').textContent  = msg;
  document.getElementById('toastOverlay').style.display = 'flex';
  _toastCallback = cb || null;
}
function closeToast() {
  document.getElementById('toastOverlay').style.display = 'none';
  if (_toastCallback) { _toastCallback(); _toastCallback = null; }
}

/* ----- Dropdown populate ----- */
function populateDropdowns(data) {
  const vSkeleton = document.getElementById('vehicleSkeleton');
  const dSkeleton = document.getElementById('driverSkeleton');
  const vSelect   = document.getElementById('vehicleSelect');
  const dSelect   = document.getElementById('driverSelect');

  vSelect.innerHTML =
    '<option value="">-- เลือกรถ --</option>' +
    data.vehicles.map(v => `<option value="${v}">${v}</option>`).join('');

  dSelect.innerHTML =
    '<option value="">-- ไม่ระบุ / ให้แอดมินจัดหา --</option>' +
    data.drivers.map(d => `<option value="${d}">${d}</option>`).join('');

  vSkeleton.style.display = 'none';
  dSkeleton.style.display = 'none';
  vSelect.style.display   = '';
  dSelect.style.display   = '';

  document.getElementById('btnSubmit').disabled = false;
}

/* ----- Calendar render ----- */
function renderCalendar(events) {
  const calendarEl = document.getElementById('calendar');

  if (calendarInstance) {
    calendarInstance.removeAllEvents();
    calendarInstance.addEventSource(events);
    return;
  }

  calendarEl.innerHTML = '';

  calendarInstance = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',
    locale: 'th',
    height: '100%',
    headerToolbar: {
      left:   'prev,next today',
      center: 'title',
      right:  'dayGridMonth,timeGridWeek,listWeek'
    },
    buttonText: {
      today:    'วันนี้',
      month:    'เดือน',
      week:     'สัปดาห์',
      list:     'รายการ'
    },
    events: events,
    eventClick: function(info) {
      const p   = info.event.extendedProps;
      const fmt = dt => dt ? dt.toLocaleString('th-TH', {
        year:'numeric', month:'short', day:'numeric',
        hour:'2-digit', minute:'2-digit'}) : '-';

      document.getElementById('evTitle').textContent   = '🚗 ' + info.event.title;
      document.getElementById('evTime').textContent    = fmt(info.event.start) + (info.event.end ? ' → ' + fmt(info.event.end) : '');
      document.getElementById('evBooker').textContent  = p.booker || '-';
      document.getElementById('evDept').textContent    = p.department || '-';
      document.getElementById('evDriver').textContent  = p.driver || '-';

      const badge = document.getElementById('evStatus');
      badge.textContent      = p.status;
      badge.className        = 'ev-badge';
      badge.style.background = info.event.backgroundColor || '#6c757d';

      document.getElementById('eventOverlay').style.display = 'flex';
    }
  });
  calendarInstance.render();
}

function closeEventModal() {
  document.getElementById('eventOverlay').style.display = 'none';
}

/* ----- Submit form ----- */
async function submitForm(e) {
  e.preventDefault();

  const alertBox = document.getElementById('conflictAlert');
  alertBox.style.display = 'none';

  const btn  = document.getElementById('btnSubmit');
  btn.disabled = true;
  btn.innerHTML = '⏳ กำลังบันทึก...';

  const form = document.getElementById('bookingForm');
  const data = Object.fromEntries(new FormData(form).entries());

  try {
    const res = await apiPost({ action: 'saveBooking', data });
    btn.disabled = false;
    btn.innerHTML = '✅ ยืนยันคำขอจองรถ';

    if (res.success) {
      showToast('✅', 'ดำเนินการจองเรียบร้อย', async () => {
        form.reset();
        const events = await api('getCalendarEvents');
        renderCalendar(events);
      });
    } else {
      alertBox.textContent = res.message;
      alertBox.style.display = 'block';
      alertBox.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  } catch(err) {
    btn.disabled = false;
    btn.innerHTML = '✅ ยืนยันคำขอจองรถ';
    showToast('❌', 'เกิดข้อผิดพลาด: ' + err.message);
  }
}

/* ===== INIT: โหลดทุกอย่างพร้อมกัน ===== */
(async () => {
  // 1) Dropdown + Calendar — โหลดพร้อมกัน
  const [dropdownData, calendarEvents] = await Promise.allSettled([
    api('getDropdownData'),
    api('getCalendarEvents')
  ]);

  if (dropdownData.status === 'fulfilled') {
    populateDropdowns(dropdownData.value);
  } else {
    document.getElementById('vehicleSkeleton').textContent = '⚠️ โหลดข้อมูลไม่สำเร็จ';
    console.error('getDropdownData failed', dropdownData.reason);
  }

  if (calendarEvents.status === 'fulfilled') {
    renderCalendar(calendarEvents.value);
  } else {
    document.getElementById('calendar').innerHTML =
      '<div class="cal-skeleton" style="color:#ef4444">⚠️ โหลดปฏิทินไม่สำเร็จ</div>';
    console.error('getCalendarEvents failed', calendarEvents.reason);
  }

  // 2) Admin link
  document.getElementById('adminLink').href = 'admin.html';
})();

// ปิด event modal ด้วย Escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeEventModal(); });
</script>
