<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>ระบบจัดการรถ (Admin)</title>

  <!-- FullCalendar -->
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js'></script>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Kanit', sans-serif;
      background: #f1f5f9;
    }

    /* Navbar */
    .navbar {
      background: linear-gradient(135deg, #1e293b, #334155);
    }

    .navbar-brand {
      font-weight: 500;
    }

    /* Card */
    .card {
      border-radius: 16px;
      border: none;
    }

    .card-header {
      border-radius: 16px 16px 0 0 !important;
      font-weight: 500;
    }

    /* Table */
    table th {
      font-weight: 500;
      font-size: 14px;
      background: #f8fafc;
    }

    table td {
      vertical-align: middle;
    }

    /* Badge */
    .badge {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 8px;
    }

    /* Buttons */
    .btn-action {
      border-radius: 8px;
      padding: 4px 10px;
    }

    .btn-success {
      background: #22c55e;
      border: none;
    }

    .btn-danger {
      background: #ef4444;
      border: none;
    }

    /* Calendar */
    #calendar {
      background: #fff;
      padding: 10px;
      border-radius: 12px;
    }

    /* Hover effect */
    .table-hover tbody tr:hover {
      background-color: #f1f5f9;
    }
  </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark mb-4 shadow-sm">
  <div class="container-fluid px-4">
    <span class="navbar-brand">🚗 ระบบหลังบ้าน - จัดการรถโรงพยาบาล</span>
    <a href="#" id="userLink" class="btn btn-sm btn-outline-light">← กลับหน้าจอง</a>
  </div>
</nav>

<div class="container-fluid px-4">

  <!-- ตาราง -->
  <div class="card shadow mb-4">
    <div class="card-header bg-warning">
      📋 รายการคำขอจองรถล่าสุด
    </div>
    <div class="card-body table-responsive">
      <table class="table table-hover align-middle">
        <thead>
          <tr>
            <th>ID</th>
            <th>ผู้จอง</th>
            <th>แผนก</th>
            <th>จุดหมาย</th>
            <th>ไป</th>
            <th>กลับ</th>
            <th>รถ</th>
            <th>คนขับ</th>
            <th>สถานะ</th>
            <th>จัดการ</th>
          </tr>
        </thead>
        <tbody id="requestTableBody">
          <tr><td colspan="10" class="text-center">กำลังโหลดข้อมูล...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Row -->
  <div class="row g-4">

    <!-- Calendar -->
    <div class="col-lg-7">
      <div class="card shadow">
        <div class="card-header bg-primary text-white">
          📅 ปฏิทินการใช้รถ
        </div>
        <div class="card-body">
          <div id="calendar" style="min-height: 450px;"></div>
        </div>
      </div>
    </div>

    <!-- Stats -->
    <div class="col-lg-5">
      <div class="card shadow">
        <div class="card-header bg-success text-white">
          📊 สถิติการใช้งาน
        </div>
        <div class="card-body text-center">
          <p class="text-muted">รองรับ Chart.js / Dashboard เพิ่มเติมได้</p>
          <div class="py-4">
            <h2 class="text-success">🚗</h2>
            <small class="text-muted">ระบบพร้อมใช้งาน</small>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
  google.script.run.withSuccessHandler(url => 
    document.getElementById('userLink').href = url
  ).getScriptUrl();

  loadRequests();
  loadCalendar();

  function loadRequests() {
    google.script.run.withSuccessHandler(displayRequests).getRequests();
  }

  function displayRequests(data) {
    const tbody = document.getElementById('requestTableBody');
    tbody.innerHTML = '';

    if (data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="10" class="text-center">ไม่มีข้อมูล</td></tr>';
      return;
    }

    data.reverse().forEach(row => {
      const id = row[0];
      const status = row[11];

      let badgeClass =
        status === 'ดำเนินการเรียบร้อย' ? 'bg-success' :
        status === 'ยกเลิก' ? 'bg-danger' :
        'bg-secondary';

      let tr = `
        <tr>
          <td>${id}</td>
          <td>${row[1]}</td>
          <td>${row[2]}</td>
          <td>${row[7]}</td>
          <td>${row[3]} ${row[4]}</td>
          <td>${row[5]} ${row[6]}</td>
          <td>${row[9] || '-'}</td>
          <td>${row[10] || '-'}</td>
          <td><span class="badge ${badgeClass}">${status}</span></td>
          <td>
            <button class="btn btn-success btn-sm btn-action"
              onclick="updateStatus('${id}', 'ดำเนินการเรียบร้อย')">✓</button>
            <button class="btn btn-danger btn-sm btn-action"
              onclick="updateStatus('${id}', 'ยกเลิก')">✗</button>
          </td>
        </tr>
      `;
      tbody.innerHTML += tr;
    });
  }

  function updateStatus(id, status) {
    if (confirm(`ต้องการ ${status} คำขอนี้ใช่หรือไม่?`)) {
      google.script.run.withSuccessHandler(res => {
        alert(res);
        loadRequests();
        loadCalendar();
      }).updateStatus(id, status);
    }
  }

  function loadCalendar() {
    google.script.run.withSuccessHandler(renderCalendar).getCalendarEvents();
  }

  function renderCalendar(events) {
    const calendarEl = document.getElementById('calendar');
    calendarEl.innerHTML = '';

    const calendar = new FullCalendar.Calendar(calendarEl, {
      initialView: 'dayGridMonth',
      locale: 'th',
      headerToolbar: {
        left: 'prev,next today',
        center: 'title',
        right: 'dayGridMonth,timeGridWeek,listWeek'
      },
      events: events,
      eventClick: function(info) {
        const p = info.event.extendedProps;
        alert(`รายละเอียด:\nรถ: ${info.event.title}\nผู้จอง: ${p.booker} (${p.department})\nคนขับ: ${p.driver}\nสถานะ: ${p.status}`);
      }
    });

    calendar.render();
  }
</script>

</body>
</html>
